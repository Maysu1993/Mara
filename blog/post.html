<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Maylen</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="post.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>
    <header>
        <div class="logo">
            <img src="/assets/logo.png" alt="Logo">
        </div>
        <button class="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav>
            <ul>    
                <li><a href="/">Home</a></li>
                <li><a href="/proyectos/proyectos.html">Projects</a></li>
                <li><a href="/blog/blog.html">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="post-layout">
            <aside class="post-toc">
                <h2 class="toc-title">Contenido</h2>
                <nav>
                    <ul id="toc-list" class="toc-list"></ul>
                </nav>
            </aside>

            <section class="post-container">
                <button type="button" class="toc-toggle-mobile">Contenido</button>
                <a id="back-link" href="blog.html" class="back-link">← Volver al blog</a>
                <script>
                    (function() {
                        const params = new URLSearchParams(window.location.search);
                        if (params.get('from') === 'proyectos') {
                            const link = document.getElementById('back-link');
                            link.href = '../proyectos/proyectos.html';
                            link.textContent = '← Volver a proyectos';
                        }
                    })();
                </script>
                <article id="post-content" class="post-article">
                    <div class="post-loading">Cargando...</div>
                </article>
            </section>
        </section>
    </main>

    <script src="../script.js"></script>
    <script src="post.js"></script>
</body>
</html>
